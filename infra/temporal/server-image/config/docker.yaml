# Temporal server config for the custom (RBAC) image — LOCAL DEV, single node.
#
# This is the file auto-setup used to render for you via `dockerize`. The custom
# binary loads it at TEMPORAL_CONFIG_FILE (main.go). It runs all four services
# (frontend, history, matching, worker) in one process against Postgres.
#
# Phase 1: NO `global.authorization` block on purpose — the compiled-in claim
# mapper stays inert, so this image behaves exactly like auto-setup. Phase 2/3
# add the authorization block to turn enforcement on. See ../AUTHZ.md §12.
#
# NOT YET VALIDATED against go.temporal.io/server v1.27 — first `podman build` +
# `make up` will confirm field names. Values mirror the auto-setup dev defaults.

log:
  stdout: true
  level: info

persistence:
  numHistoryShards: 4
  defaultStore: default
  visibilityStore: visibility
  datastores:
    default:
      sql:
        pluginName: "postgres12"          # matches compose DB=postgres12
        databaseName: "temporal"
        connectAddr: "postgresql:5432"    # compose service name
        connectProtocol: "tcp"
        user: "temporal"
        password: "temporal"
        maxConns: 20
        maxIdleConns: 20
        maxConnLifetime: "1h"
    visibility:
      sql:
        pluginName: "postgres12"
        databaseName: "temporal_visibility"
        connectAddr: "postgresql:5432"
        connectProtocol: "tcp"
        user: "temporal"
        password: "temporal"
        maxConns: 10
        maxIdleConns: 10
        maxConnLifetime: "1h"

global:
  membership:
    maxJoinDuration: 30s
    broadcastAddress: "127.0.0.1"         # single container: services gossip in-process
  # No `authorization:` block in Phase 1 — enforcement is off.

services:
  frontend:
    rpc:
      grpcPort: 7233
      membershipPort: 6933
      bindOnIP: "0.0.0.0"                 # reachable from UI/host over the compose network
  matching:
    rpc:
      grpcPort: 7235
      membershipPort: 6935
      bindOnIP: "0.0.0.0"
  history:
    rpc:
      grpcPort: 7234
      membershipPort: 6934
      bindOnIP: "0.0.0.0"
  worker:
    rpc:
      grpcPort: 7239
      membershipPort: 6939
      bindOnIP: "0.0.0.0"
  # Internal-only frontend for Temporal's own system workers. It bypasses the
  # authorizer, so enabling auth doesn't reject internal traffic ("Request
  # unauthorized"). Not published to the host — container-internal only.
  internal-frontend:
    rpc:
      grpcPort: 7236
      membershipPort: 6936
      bindOnIP: "0.0.0.0"

clusterMetadata:
  enableGlobalNamespace: false
  failoverVersionIncrement: 10
  masterClusterName: "active"
  currentClusterName: "active"
  clusterInformation:
    active:
      enabled: true
      initialFailoverVersion: 1
      rpcName: "frontend"
      rpcAddress: "127.0.0.1:7233"

dcRedirectionPolicy:
  policy: "noop"

# publicClient is intentionally omitted: with internal-frontend enabled, internal
# components use it instead, and Temporal requires publicClient to be absent.

dynamicConfigClient:
  filepath: "/etc/temporal/dynamicconfig/development-sql.yaml"
  pollInterval: "60s"
