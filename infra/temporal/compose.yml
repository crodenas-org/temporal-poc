name: temporal-dev

services:
  postgresql:
    image: docker.io/postgres:18
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    volumes:
      - postgresql_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: docker.io/temporalio/auto-setup:1.27
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgresql
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
      # mTLS DISABLED for local dev (2026-07-14) — server runs plaintext gRPC so
      # host workers/clients connect without certs. To re-enable, restore the
      # TEMPORAL_TLS_* block from git history and reconnect clients with the
      # TEMPORAL_TLS_CA/CERT/KEY env vars (+ server-name override "temporal").
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
      - ./certs:/etc/temporal/certs:ro
    ports:
      - "7233:7233"
    restart: unless-stopped

  temporal-ui:
    image: docker.io/temporalio/ui:latest
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
      # mTLS client certs removed for local dev — UI connects to plaintext server
    volumes:
      - ./certs:/etc/temporal/certs:ro
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgresql_data:
