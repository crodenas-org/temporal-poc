name: temporal-dev

services:
  postgresql:
    image: docker.io/postgres:18
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    volumes:
      - postgresql_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: docker.io/temporalio/auto-setup:1.27
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgresql
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
      # mTLS — only active when certs/ directory is populated (run: make certs)
      # Frontend (external clients/workers → Temporal server)
      TEMPORAL_TLS_FRONTEND_CERT: /etc/temporal/certs/server.crt
      TEMPORAL_TLS_FRONTEND_KEY: /etc/temporal/certs/server.key
      TEMPORAL_TLS_CLIENT1_CA_CERT: /etc/temporal/certs/ca.crt
      TEMPORAL_TLS_REQUIRE_CLIENT_AUTH: "true"
      # Internode (Temporal internal services → each other)
      TEMPORAL_TLS_SERVER_CERT: /etc/temporal/certs/server.crt
      TEMPORAL_TLS_SERVER_KEY: /etc/temporal/certs/server.key
      TEMPORAL_TLS_SERVER_CA_CERT: /etc/temporal/certs/ca.crt
      TEMPORAL_TLS_FRONTEND_SERVER_NAME: temporal
      TEMPORAL_TLS_INTERNODE_SERVER_NAME: temporal
      # auto-setup CLI (the setup script connects to the server it just started)
      TEMPORAL_TLS_CA: /etc/temporal/certs/ca.crt
      TEMPORAL_TLS_CERT: /etc/temporal/certs/server.crt
      TEMPORAL_TLS_KEY: /etc/temporal/certs/server.key
      TEMPORAL_TLS_SERVER_NAME: temporal
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
      - ./certs:/etc/temporal/certs:ro
    ports:
      - "7233:7233"
    restart: unless-stopped

  temporal-ui:
    image: docker.io/temporalio/ui:latest
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
      # mTLS client cert for UI → Temporal server connection
      TEMPORAL_TLS_CA: /etc/temporal/certs/ca.crt
      TEMPORAL_TLS_CERT: /etc/temporal/certs/temporal-ui.crt
      TEMPORAL_TLS_KEY: /etc/temporal/certs/temporal-ui.key
    volumes:
      - ./certs:/etc/temporal/certs:ro
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgresql_data:
