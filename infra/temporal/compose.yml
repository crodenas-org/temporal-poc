name: temporal-dev

# Local dev stack for the CUSTOM Temporal server image (RBAC-capable, auth OFF in
# Phase 1). Replaces the single auto-setup container with: a one-shot schema
# init, the custom server built from ./server-image, a one-shot default-namespace
# creator, a long-lived admin/CLI sidecar, and the UI. See AUTHZ.md §5/§12.

services:
  postgresql:
    image: docker.io/postgres:18
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    volumes:
      - postgresql_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create databases + install schema, then exit. Replaces the
  # schema-migration half of auto-setup.
  temporal-schema:
    image: docker.io/temporalio/admin-tools:1.27
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      SQL_PLUGIN: postgres12
      SQL_HOST: postgresql
      SQL_PORT: "5432"
      SQL_USER: temporal
      SQL_PASSWORD: temporal
    volumes:
      - ./scripts:/scripts:ro
    # admin-tools ENTRYPOINT is `tini -- sleep infinity`, so override it to
    # actually run our script instead of appending args to sleep.
    entrypoint: ["bash"]
    command: ["/scripts/setup-schema.sh"]
    restart: "no"

  # Custom server: standard Temporal + our compiled-in ClaimMapper, built locally
  # from ./server-image. Authorization is OFF in Phase 1 (docker.yaml has no
  # authorization block), so runtime behavior matches auto-setup.
  temporal:
    build:
      context: ./server-image
    depends_on:
      postgresql:
        condition: service_healthy
      temporal-schema:
        condition: service_completed_successfully
    environment:
      TEMPORAL_CONFIG_DIR: /etc/temporal/config
      TEMPORAL_ENVIRONMENT: docker
      # Empty = auth OFF (default). `make auth-on` sets this to the Entra JWKS URI.
      TEMPORAL_AUTH_JWKS_URI: "${TEMPORAL_AUTH_JWKS_URI:-}"
      # Audience the UI's ID token must be addressed to. Pins tokens to this app
      # so another app's token from the same tenant can't be replayed here.
      TEMPORAL_AUTH_CLIENT_ID: "${TEMPORAL_AUTH_CLIENT_ID:-}"
      # 1 = log which credential surface each request carries and the claims it
      # maps to. Authorization denials are otherwise silent. Never logs tokens.
      TEMPORAL_AUTH_DEBUG: "${TEMPORAL_AUTH_DEBUG:-0}"
    volumes:
      - ./server-image/config:/etc/temporal/config:ro
      - ./dynamicconfig:/etc/temporal/dynamicconfig:ro
    ports:
      - "7233:7233"
    restart: unless-stopped

  # One-shot: create the 'default' namespace once the server is reachable.
  temporal-defaultns:
    image: docker.io/temporalio/admin-tools:1.27
    depends_on:
      temporal:
        condition: service_started
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["bash"]
    command: ["/scripts/create-namespace.sh", "default"]
    restart: "no"

  # Long-lived CLI sidecar. `make admin` / `make namespace` exec into this — the
  # distroless server image has no `temporal` CLI or shell.
  temporal-admin:
    image: docker.io/temporalio/admin-tools:1.27
    depends_on:
      temporal:
        condition: service_started
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    volumes:
      - ./scripts:/scripts:ro
    # No command override — the image's default `tini -- sleep infinity` entrypoint
    # is exactly what we want for a long-lived CLI sidecar.
    restart: unless-stopped

  temporal-ui:
    image: docker.io/temporalio/ui:latest
    depends_on:
      temporal:
        condition: service_started
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
      # Entra OIDC — inert unless TEMPORAL_AUTH_ENABLED=true (set by `make auth-on`).
      # IDs/secret come from .env (written by scripts/entra-app-setup.sh).
      TEMPORAL_AUTH_ENABLED: "${TEMPORAL_AUTH_ENABLED:-false}"
      TEMPORAL_AUTH_TYPE: oidc
      TEMPORAL_AUTH_PROVIDER_URL: "https://login.microsoftonline.com/${TEMPORAL_AUTH_TENANT_ID:-common}/v2.0"
      TEMPORAL_AUTH_CLIENT_ID: "${TEMPORAL_AUTH_CLIENT_ID:-}"
      TEMPORAL_AUTH_CLIENT_SECRET: "${TEMPORAL_AUTH_CLIENT_SECRET:-}"
      TEMPORAL_AUTH_CALLBACK_URL: "http://localhost:8080/auth/sso/callback"
      TEMPORAL_AUTH_SCOPES: "openid,profile,email"
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgresql_data:
